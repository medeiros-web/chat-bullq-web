<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sem conexão — Chat BullQ</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f4f4f5;
        color: #18181b;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
        gap: 1.5rem;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #09090b; color: #fafafa; }
        .card { background: #18181b; border-color: #27272a; }
        .retry { background: #2563eb; }
      }
      .icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(145deg, #1e3a8a, #2563eb);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
      }
      .card {
        background: #fff;
        border: 1px solid #e4e4e7;
        border-radius: 16px;
        padding: 2rem;
        max-width: 360px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      h1 { font-size: 1.25rem; font-weight: 700; }
      p { font-size: 0.875rem; color: #71717a; line-height: 1.6; }
      .retry {
        background: #1e3a8a;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 0.75rem 2rem;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        margin-top: 0.5rem;
        transition: opacity 0.15s;
      }
      .retry:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">💬</div>
      <h1>Você está offline</h1>
      <p>
        Não foi possível conectar ao Chat BullQ.<br />
        Verifique sua conexão e tente novamente.
      </p>
      <button class="retry" onclick="window.location.reload()">Tentar novamente</button>
    </div>
  </body>
</html>
